[build]
  publish = "."

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"

[[redirects]]
  from = "/disc-test"
  to = "/disc-test.html"
  status = 200

[[redirects]]
  from = "/test-kesehatan"
  to = "/test-kesehatan.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
