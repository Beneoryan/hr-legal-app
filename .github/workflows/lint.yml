name: Lint & Format Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
      
      - name: Check Prettier formatting
        run: npm run format:check
        continue-on-error: true

  workspace-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify .vscode/settings.json exists
        run: test -f .vscode/settings.json && echo ".vscode/settings.json found" || exit 1
      
      - name: Verify .vscode/extensions.json exists
        run: test -f .vscode/extensions.json && echo ".vscode/extensions.json found" || exit 1
      
      - name: Validate JSON files
        run: |
          python3 -m json.tool .vscode/settings.json > /dev/null && echo "settings.json is valid JSON"
          python3 -m json.tool .vscode/extensions.json > /dev/null && echo "extensions.json is valid JSON"
